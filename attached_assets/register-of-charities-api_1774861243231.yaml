          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charitypolicyinformation/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityPolicyInformation
      description: Returns a list of policies the charity has in place.
      operationId: get-getcharitypolicyinformation
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/CharityAoOCountryContinent/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityAoOCountryContinent
      description: Gets continent and country level information about a charity's area of operation.
      operationId: get-getcharityaoocountrycontinent
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charityoverview/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityOverview
      description: Returns information from a charity's most recently submitted Annual Return.
      operationId: get-getcharityoverview
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/allcharitydetails/{RegisteredNumber}/{suffix}':
    get:
      summary: GetAllCharityDetails
      description: 'Gets extended main details about a charity including trustees, classifications and areas of operation.'
      operationId: get-getallcharitydetails
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/CharityOtherRegulators/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityOtherRegulators
      description: Returns a list of other organisations the charity is regulated by.
      operationId: get-getcharityotherregulators
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charityaraccounts/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityAccountArInformation
      description: Gets a charity's AR and Accounts submission details.
      operationId: get-getcharityaccountarinformation
      parameters:
        - name: RegisteredNumber

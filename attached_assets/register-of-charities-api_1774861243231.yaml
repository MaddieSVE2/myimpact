          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charityregulatoryreport/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityRegulatoryReport

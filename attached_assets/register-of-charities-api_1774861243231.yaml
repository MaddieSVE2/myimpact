  '/charitytrusteeinformation/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityTrusteeInformation
      description: Gets details of a charity's trustees and other charities they are linked to.
      operationId: get-getcharitytrusteeinformation
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/searchCharityRemDate/{startDate}/{endDate}':
    get:
      summary: GetSearchCharityByRemDate
      description: Search for charities by their register removal date.
      operationId: get-getsearchcharitybyremdate
      parameters:
        - name: startDate
          in: path
          description: The earliest removal date of range to be searched in the format YYYY-MM-DD
          required: true
          schema:
            type: Date
        - name: endDate
          in: path
          description: The latest removal date of range to be searched in the format YYYY-MM-DD
          required: true
          schema:
            type: Date
      responses:
        '200':
          description: ''
  '/searchCharityRegDate/{startDate}/{endDate}':
    get:
      summary: GetSearchCharityByRegDate
      description: Search for charities by their registration date.
      operationId: get-getsearchcharitybyregdate
      parameters:
        - name: startDate
          in: path
          description: Earliest registration date of range to search in the format YYYY-MM-DD
          required: true
          schema:
            type: Date
        - name: endDate
          in: path
          description: Latest registration date of range to search in the format YYYY-MM-DD
          required: true
          schema:
            type: Date
      responses:
        '200':
          description: ''
  '/charitycontactinformation/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityContactInformation

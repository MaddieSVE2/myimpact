      operationId: get-getcharitywhowhathow
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charitydetails/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityDetails
      description: Gets main details about a charity.
      operationId: get-getcharitydetails
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charitytrusteenames/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityTrusteeNames
      description: Returns the names of a charity's trustees.
      operationId: get-getcharitytrusteenames
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/searchCharityName/{charityname}':
    get:
      summary: GetSearchCharityByName
      description: Search for charities by their name.
      operationId: get-getsearchcharitybyname
      parameters:
        - name: charityname
          in: path
          description: Charity name search term
          required: true
          schema:
            type: String
      responses:
        '200':
          description: ''
  '/charitygovernanceinformation/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityGovernanceInformation
      description: Gets simple governance details.
      operationId: get-getcharitygovernanceinformation
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charityconstituency/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityConstituency

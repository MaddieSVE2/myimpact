      responses:
        '200':
          description: ''
  '/charityothernames/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityOtherNames
      description: Gets other names the charity is or has been known by.
      operationId: get-getcharityothernames
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true

components:
  schemas:
    SectorDataOverview:
      type: object
      properties:
        date_updated:
          type: string
          format: date
        number_of_main_charities:
          type: integer
          format: int32
        number_of_linked_charities:
          type: integer
          format: int32
        income:
          type: integer
          format: int64
        expenditure:
          type: integer
          format: int64
        inc_donations_legacies:
          type: integer
          format: int64
        inc_other_trading_activities:
          type: integer
          format: int64
        inc_investments:
          type: integer
          format: int64
        inc_charitable_activities:
          type: integer
          format: int64
        inc_other:
          type: integer
          format: int64
        inc_total:
          type: integer
          format: int64
        investment_gains_losses:
          type: integer
          format: int64
        income_growth:
          type: integer
          format: int64
        exp_raising_funds:
          type: integer
          format: int64
        exp_charitable_activities:
          type: integer
          format: int64
        exp_other:
          type: integer
          format: int64
        exp_total:
          type: integer
          format: int64
        expenditure_growth:
          type: integer
          format: int64
        assets_own_use:
          type: integer
          format: int64
        assets_long_term_investment:
          type: integer
          format: int64
        defined_net_assets_pension:
          type: integer
          format: int64
        assets_other_assets:
          type: integer
          format: int64
        assets_total_liabilities:
          type: integer
          format: int64
        employees:
          type: integer
          format: int64
        volunteers:
          type: integer
          format: int64
        trustees:
          type: integer
          format: int64
        exp_on_income_generation:
          type: integer
          format: int64
        retained:
          type: integer
          format: int64
      example:
        date_updated: string
        number_of_main_charities: 0
        number_of_linked_charities: 0
        income: 0
        expenditure: 0
        inc_donations_legacies: 0
        inc_other_trading_activities: 0
        inc_investments: 0
        inc_charitable_activities: 0
        inc_other: 0
        inc_total: 0
        investment_gains_losses: 0
        income_growth: 0
        exp_raising_funds: 0
        exp_charitable_activities: 0
        exp_other: 0
        exp_total: 0
        expenditure_growth: 0
        assets_own_use: 0
        assets_long_term_investment: 0
        defined_net_assets_pension: 0
        assets_other_assets: 0
        assets_total_liabilities: 0
        employees: 0
        volunteers: 0
        trustees: 0
        exp_on_income_generation: 0
        retained: 0
    SectorDataIncomeCategory:
      type: array
      items:
        required:
          - income_category
          - order_no
          - no_of_charities
          - tot_income_endowments
          - tot_expenditure
          - avg_income_endowments
          - avg_expenditure
          - perc_of_charities
          - perc_of_income
          - perc_of_expenditure
          - inc_donations_legacies
          - inc_other_trading_activities
          - inc_investments
          - inc_charitable_activities
          - inc_other
          - investment_gains_losses
          - exp_raising_funds
          - exp_charitable_activities
          - exp_other
          - assets_own_use
          - assets_long_term_investment
          - defined_net_assets_pension
          - assets_other_assets
          - assets_total_liabilities
          - trustees
          - employees
          - volunteers
          - last_modified_time
          - tot_gross_income
          - tot_gross_expenditure
          - avg_gross_income
        type: object
        properties:
          income_category:
            type: string
          order_no:
            type: integer
            format: int32
          no_of_charities:
            type: integer
            format: int32
          tot_income_endowments:
            type: integer
            format: int64
          tot_expenditure:
            type: integer
            format: int64
          avg_income_endowments:
            type: integer
            format: int64
          avg_expenditure:
            type: integer
            format: int64
          perc_of_charities:
            type: integer
            format: int64
          perc_of_income:
            type: integer
            format: int64
          perc_of_expenditure:
            type: integer
            format: int64
          inc_donations_legacies:
            type: integer
            format: int64
          inc_other_trading_activities:
            type: integer
            format: int64
          inc_investments:
            type: integer
            format: int64
          inc_charitable_activities:
            type: integer
          inc_other:
            type: integer
            format: int64
          investment_gains_losses:
            type: integer
            format: int64
          exp_raising_funds:
            type: integer
            format: int64
          exp_charitable_activities:
            type: integer
          exp_other:
            type: integer
            format: int64
          assets_own_use:
            type: integer
            format: int64
          assets_long_term_investment:
            type: integer
            format: int64
          defined_net_assets_pension:
            type: integer
            format: int64
          assets_other_assets:
            type: integer
            format: int64
          assets_total_liabilities:
            type: integer
            format: int64
          trustees:
            type: integer
            format: int64
          employees:
            type: integer
            format: int32
          volunteers:
            type: integer
            format: int32
          last_modified_time:
            type: string
            format: date
          tot_gross_income:
            type: integer
            format: int64
          tot_gross_expenditure:

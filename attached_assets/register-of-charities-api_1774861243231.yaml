openapi: 3.0.1
info:
  title: Register of Charities API
  description: A collection of operations for accessing the Register of Charities data.
  version: '1.0'
servers:
  - url: https://api.charitycommission.gov.uk/register/api
paths:
  /sectorincomecategory:
    get:
      summary: SectorDataIncomeCategory
      description: "Returns sector data split by income category.\n"
      operationId: get-sectordataincomecategory
      responses:
        '200':
          description: ''
  /sectoroverview:
    get:
      summary: SectorDataOverview
      description: Returns an overview of the sector.
      operationId: get-sectordataoverview
      responses:
        '200':
          description: ''
  /sectordatatop10:
    get:
      summary: SectorDataGetTopN01All
      description: Returns all top ten lists from the sector data.
      operationId: get-sectordatagettopn01all
      responses:
        '200':
          description: ''
  '/charityfinancialhistory/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityFinancialHistory
      description: Gets the last 5 years financial history for a charity.
      operationId: get-getcharityfinancialhistory
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/sectordatatop10/{listType}':
    get:
      summary: SectorDataGetTop10Individual
      description: Returns a specified list of top 10 charities from the sector data.
      operationId: get-sectordatagettop10individual
      parameters:
        - name: listType
          in: path
          description: The type of list to be views
          required: true
          schema:
            type: String
      responses:
        '200':
          description: ''
  '/charityassetsliabilities/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityAssetsLiabilities
      description: Gets a charity's most recent assets and liabilities figures.
      operationId: get-getcharityassetsliabilities
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/ciodissolution/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityCioDissolution
      description: Gets details of a CIO dissolution.
      operationId: get-getcharityciodissolution
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charityRegNumber/{RegisteredNumber}/{suffix}':
    get:
      summary: GetSearchCharityByRegNumber
      description: Search for charities by their registered number.
      operationId: get-getsearchcharitybyregnumber
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charitygoverningdocument/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityGoverningDocument
      description: Gets a charity's governing document details.
      operationId: get-getcharitygoverningdocument
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/charitydetailsmulti/{RegisteredNumbers}':
    get:
      summary: GetCharityDetailsMulti
      description: Gets main details about multiple charities.
      operationId: get-getcharitydetailsmulti
      parameters:
        - name: RegisteredNumbers
          in: path
          description: The registration numbers of the charities. Comma separated list
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  '/checkprimarygrants/{RegisteredNumber}/{suffix}':
    get:
      summary: GetCharityCheckPrimaryGrants
      description: Whether a charity's primary purpose is grant making.
      operationId: get-getcharitycheckprimarygrants
      parameters:
        - name: RegisteredNumber
          in: path
          description: The registration number of the charity
          required: true
          schema:
            type: Integer
        - name: suffix
          in: path
          description: The subsidiary or linked charity number
          required: true
          schema:
            type: Integer
      responses:
        '200':
          description: ''
  /sectorincomeband:
    get:
      summary: SectorDataIncomeBand
      description: Returns sector data split by income bands.
      operationId: get-sectordataincomeband
      responses:
        '200':
          description: ''
  '/charitywhowhathow/{RegisteredNumber}/{suffix}':

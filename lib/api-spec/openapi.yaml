openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: My Impact API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: impact
    description: Impact calculation operations
  - name: profile
    description: User profile operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /impact/calculate:
    post:
      operationId: calculateImpact
      tags: [impact]
      summary: Calculate personal social value
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImpactInput"
      responses:
        "200":
          description: Calculated impact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactResult"
  /impact/activities:
    get:
      operationId: getActivities
      tags: [impact]
      summary: Get available activities from Social Value Engine proxy library
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivitiesResponse"
  /impact/suggestions:
    post:
      operationId: getSuggestions
      tags: [impact]
      summary: Get suggested activities based on user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestionsInput"
      responses:
        "200":
          description: Suggested activities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestionsResponse"
  /impact/save:
    post:
      operationId: saveImpact
      tags: [impact]
      summary: Save a user's impact record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveImpactInput"
      responses:
        "200":
          description: Saved impact record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedImpact"
  /impact/history:
    get:
      operationId: getImpactHistory
      tags: [impact]
      summary: Get impact history for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Impact history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImpactHistoryResponse"
  /impact/all:
    delete:
      operationId: deleteAllImpactRecords
      tags: [impact]
      summary: Delete all impact records for the authenticated user
      security:
        - cookieAuth: []
      responses:
        "200":
          description: All records deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllImpactRecordsResponse"
        "401":
          description: Not authenticated
  /impact/{id}:
    patch:
      operationId: updateImpactRecord
      tags: [impact]
      summary: Update the period label of an impact record
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateImpactRecordInput"
      responses:
        "200":
          description: Updated record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateImpactRecordResponse"
        "401":
          description: Not authenticated
        "404":
          description: Not found
    delete:
      operationId: deleteImpactRecord
      tags: [impact]
      summary: Delete a single impact record
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteImpactRecordResponse"
        "401":
          description: Not authenticated
        "404":
          description: Not found
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get current user profile
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Upsert current user profile
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ActivityItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        shortName:
          type: string
        category:
          type: string
        proxy:
          type: string
        proxyYear:
          type: string
        unit:
          type: string
        unitLabel:
          type: string
        friendlyQuestion:
          type: string
        defaultQuantity:
          type: number
        valuePerUnit:
          type: number
        sdg:
          type: string
        sdgColor:
          type: string
        description:
          type: string
      required:
        - id
        - name
        - shortName
        - category
        - proxy
        - proxyYear
        - unit
        - unitLabel
        - friendlyQuestion
        - defaultQuantity
        - valuePerUnit
        - sdg
        - sdgColor
        - description
    ActivitiesResponse:
      type: object
      properties:
        activities:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        categories:
          type: array
          items:
            type: string
      required:
        - activities
        - categories
    SelectedActivity:
      type: object
      properties:
        activityId:
          type: string
        quantity:
          type: number
        hoursPerYear:
          type: number
        description:
          type: string
      required:
        - activityId
        - quantity
        - hoursPerYear
    CustomActivityInput:
      type: object
      properties:
        activityId:
          type: string
        name:
          type: string
        quantity:
          type: number
        hoursPerYear:
          type: number
        valuePerUnit:
          type: number
        unit:
          type: string
        proxy:
          type: string
        proxyYear:
          type: string
        sdg:
          type: string
        sdgColor:
          type: string
      required:
        - activityId
        - name
        - quantity
        - hoursPerYear
        - valuePerUnit
        - unit
        - proxy
        - proxyYear
        - sdg
        - sdgColor
    ImpactInput:
      type: object
      properties:
        description:
          type: string
        activities:
          type: array
          items:
            $ref: "#/components/schemas/SelectedActivity"
        customActivities:
          type: array
          items:
            $ref: "#/components/schemas/CustomActivityInput"
        donationsGBP:
          type: number
        additionalVolunteerHours:
          type: number
      required:
        - description
        - activities
        - donationsGBP
        - additionalVolunteerHours
    ActivityBreakdown:
      type: object
      properties:
        activityId:
          type: string
        activityName:
          type: string
        category:
          type: string
        proxy:
          type: string
        proxyYear:
          type: string
        sdg:
          type: string
        sdgColor:
          type: string
        impactValue:
          type: number
        hours:
          type: number
      required:
        - activityId
        - activityName
        - category
        - sdg
        - sdgColor
        - impactValue
        - hours
    ImpactResult:
      type: object
      properties:
        totalValue:
          type: number
        impactValue:
          type: number
        contributionValue:
          type: number
        donationsValue:
          type: number
        personalDevelopmentValue:
          type: number
        totalHours:
          type: number
        activityBreakdowns:
          type: array
          items:
            $ref: "#/components/schemas/ActivityBreakdown"
        sdgBreakdowns:
          type: array
          items:
            type: object
            properties:
              sdg:
                type: string
              sdgColor:
                type: string
              value:
                type: number
            required:
              - sdg
              - sdgColor
              - value
        explanations:
          type: object
          properties:
            impact:
              type: string
            contribution:
              type: string
            donations:
              type: string
            personalDevelopment:
              type: string
          required:
            - impact
            - contribution
            - donations
            - personalDevelopment
      required:
        - totalValue
        - impactValue
        - contributionValue
        - donationsValue
        - personalDevelopmentValue
        - totalHours
        - activityBreakdowns
        - sdgBreakdowns
        - explanations
    SaveImpactInput:
      type: object
      properties:
        userId:
          type: string
        name:
          type: string
        period:
          type: string
          nullable: true
        impactResult:
          $ref: "#/components/schemas/ImpactResult"
        activities:
          type: array
          items:
            $ref: "#/components/schemas/SelectedActivity"
        customActivities:
          type: array
          items:
            $ref: "#/components/schemas/CustomActivityInput"
        donationsGBP:
          type: number
        additionalVolunteerHours:
          type: number
        region:
          type: string
          nullable: true
        outwardCode:
          type: string
          nullable: true
        lat:
          type: number
          nullable: true
        lng:
          type: number
          nullable: true
      required:
        - userId
        - name
        - impactResult
        - activities
        - donationsGBP
        - additionalVolunteerHours
    SavedImpact:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        period:
          type: string
          nullable: true
        createdAt:
          type: string
        impactResult:
          $ref: "#/components/schemas/ImpactResult"
      required:
        - id
        - userId
        - name
        - createdAt
        - impactResult
    ImpactHistoryResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/SavedImpact"
      required:
        - records
    SuggestionsInput:
      type: object
      properties:
        currentActivities:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        availableHoursPerWeek:
          type: number
      required:
        - currentActivities
        - availableHoursPerWeek
    SuggestionItem:
      type: object
      properties:
        activityId:
          type: string
        activityName:
          type: string
        category:
          type: string
        sdg:
          type: string
        sdgColor:
          type: string
        reason:
          type: string
        estimatedImpactPerYear:
          type: number
        recommendedHoursPerWeek:
          type: number
      required:
        - activityId
        - activityName
        - category
        - sdg
        - sdgColor
        - reason
        - estimatedImpactPerYear
        - recommendedHoursPerWeek
    SuggestionsResponse:
      type: object
      properties:
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/SuggestionItem"
      required:
        - suggestions
    UserProfileData:
      type: object
      properties:
        situation:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        postcode:
          type: string
          nullable: true
        updatedAt:
          type: string
    ProfileResponse:
      type: object
      properties:
        profile:
          oneOf:
            - $ref: "#/components/schemas/UserProfileData"
            - type: "null"
      required:
        - profile
    ProfileInput:
      type: object
      properties:
        situation:
          type: array
          items:
            type: string
        interests:
          type: array
          items:
            type: string
        postcode:
          type: string
          nullable: true
    UpdateImpactRecordInput:
      type: object
      properties:
        periodLabel:
          type: string
      required:
        - periodLabel
    UpdateImpactRecordResponse:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        name:
          type: string
        period:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - userId
        - name
        - createdAt
    DeleteImpactRecordResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
    DeleteAllImpactRecordsResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
